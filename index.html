<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日本語を勉強しよう!! - TV Menu</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+KR:wght@300;400;700&family=Noto+Sans+JP:wght@400;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #080710;
            --card-bg: #131224; 
            --card-border: rgba(255, 255, 255, 0.12);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            
            --color-theme1: #c084fc; 
            --color-theme2: #34d399; 
            --color-theme3: #fbbf24; 
            --color-theme4: #38bdf8; 
            
            --transition-speed: 0.2s;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 50%, rgba(168, 85, 247, 0.05) 0%, transparent 80%);
            color: var(--text-primary);
            font-family: 'Outfit', 'Noto Sans KR', 'Noto Sans JP', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }

        /* [수정된 부분] 헤더 정렬 및 여백 조정 */
        header {
            width: 100%;
            max-width: 1600px;
            display: flex;
            justify-content: center; /* 제목 중앙 정렬 */
            align-items: center;
            padding: 60px 40px 20px 40px; /* 좌우 여백 축소 */
        }

        h1 {
            font-size: 52px;
            font-weight: 800;
            margin: 0;
            font-family: 'Noto Sans JP', sans-serif;
            background: linear-gradient(135deg, #a855f7 0%, #06b6d4 50%, #10b981 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .container {
            width: 100%;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding-bottom: 80px;
        }

        .horizontal-menu {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 20px; /* 여백 축소 */
            overflow-x: auto;
            overflow-y: hidden;
            scroll-behavior: smooth;
        }

        .horizontal-menu::-webkit-scrollbar {
            display: none;
        }
        .horizontal-menu {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .menu-btn {
            background: var(--card-bg);
            border: 2px solid var(--card-border);
            border-radius: 36px; 
            width: 280px;     /* 버튼 크기 조정 */
            height: 380px;    /* 버튼 크기 조정 */
            padding: 40px 30px;
            flex-shrink: 0; 
            margin-right: 20px; /* 간격 축소 */
            
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            cursor: pointer;
            outline: none;
            
            transition: transform var(--transition-speed) ease, 
                        border-color var(--transition-speed) ease, 
                        background-color var(--transition-speed) ease,
                        box-shadow var(--transition-speed) ease;
        }

        .menu-btn:last-child {
            margin-right: 0;
        }

        .menu-icon {
            font-size: 56px;
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.04);
            width: 110px;
            height: 110px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: background var(--transition-speed) ease, border-color var(--transition-speed) ease;
        }

        .menu-text {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .menu-text h3 {
            font-size: 26px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 12px;
            transition: color var(--transition-speed) ease;
            word-break: keep-all;
        }

        .menu-text p {
            font-size: 16px;
            font-weight: 400;
            line-height: 1.5;
            color: var(--text-secondary);
            word-break: keep-all;
        }

        /* 테마별 호버 효과 (생략 가능, 기존 유지) */
        .menu-btn.theme-1:hover { border-color: var(--color-theme1); }
        .menu-btn.theme-2:hover { border-color: var(--color-theme2); }
        .menu-btn.theme-3:hover { border-color: var(--color-theme3); }
        .menu-btn.theme-4:hover { border-color: var(--color-theme4); }

    </style>
</head>
<body>

    <header>
        <h1>日本語 敎室</h1>
    </header>

    <div class="container">
        <div class="horizontal-menu" id="menuContainer">
            <button class="menu-btn theme-1" tabindex="1" data-url="https://tajunii.github.io/japanese-study/">
                <div class="menu-icon">🎤</div>
                <div class="menu-text">
                    <h3>쉐도잉 연습</h3>
                    <p>원어민의 발음과<br>억양을 따라해 보세요</p>
                </div>
            </button>

            <button class="menu-btn theme-2" tabindex="2" data-url="https://tajunii.github.io/wpstudy/">
                <div class="menu-icon">📚</div>
                <div class="menu-text">
                    <h3>단어 / 문법</h3>
                    <p>핵심 어휘와 문법을<br>확실하게 다져보세요</p>
                </div>
            </button>

            <button class="menu-btn theme-3" tabindex="3" data-url="https://tajunii.github.io/conversationstudy/">
                <div class="menu-icon">💬</div>
                <div class="menu-text">
                    <h3>일상 표현 익히기</h3>
                    <p>실제 생활에서 쓰이는<br>자연스러운 회화 표현</p>
                </div>
            </button>

            <button class="menu-btn theme-4" tabindex="4" data-url="https://tajunii.github.io/ptn-convstudy/">
                <div class="menu-icon">🧩</div>
                <div class="menu-text">
                    <h3>문형 익히기</h3>
                    <p>다양한 패턴과 문형을<br>통해 응용력을 키우세요</p>
                </div>
            </button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const buttons = Array.from(document.querySelectorAll('.menu-btn'));
            if (buttons.length > 0) buttons[0].focus();

            buttons.forEach(btn => {
                btn.addEventListener('click', function() {
                    const targetUrl = this.getAttribute('data-url');
                    if(targetUrl) window.location.href = targetUrl;
                });
            });

            document.addEventListener('keydown', (e) => {
                const currentIndex = buttons.indexOf(document.activeElement);
                if (e.key === 'ArrowRight') {
                    e.preventDefault(); 
                    const nextIndex = currentIndex + 1 < buttons.length ? currentIndex + 1 : 0;
                    buttons[nextIndex].focus();
                    buttons[nextIndex].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                } else if (e.key === 'ArrowLeft') {
                    e.preventDefault();
                    const prevIndex = currentIndex > 0 ? currentIndex - 1 : buttons.length - 1;
                    buttons[prevIndex].focus();
                    buttons[prevIndex].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                } else if (e.key === 'Enter' && currentIndex !== -1) {
                    const targetUrl = buttons[currentIndex].getAttribute('data-url');
                    if(targetUrl) window.location.href = targetUrl;
                }
            });
        });
    </script>
</body>
</html>
